<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>OrderPro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Manrope',system-ui,sans-serif;}
:root{
  --bg:#f4f5f7;
  --surface:#ffffff;
  --surface-2:#fbfbfc;
  --line:#e7e9ee;
  --line-2:#dadde4;
  --ink:#0f1729;
  --ink-2:#5a6475;
  --ink-3:#9aa3b2;
  --p:#4f46e5;
  --p-soft:#eef0fe;
  --p-ink:#4338ca;
  --green:#15803d;
  --green-soft:#e7f6ec;
  --amber:#b45309;
  --amber-soft:#fdf3e3;
  --red:#dc2626;
  --red-soft:#fdecec;
  --blue:#2563eb;
  --blue-soft:#e8f0fe;
  --r:14px;
  --r-sm:10px;
  --nav:66px;
  --shadow:0 1px 2px rgba(16,23,41,.04),0 4px 16px rgba(16,23,41,.06);
  --shadow-lg:0 12px 40px rgba(16,23,41,.16);
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--ink);overflow:hidden;}
body{-webkit-font-smoothing:antialiased;}
input,textarea,select,button{font-family:inherit;}
.tnum{font-variant-numeric:tabular-nums;}

/* ===== SCREENS ===== */
.screen{position:fixed;inset:0;display:none;flex-direction:column;}
.screen.show{display:flex;}

/* ===== LOGIN ===== */
#screen-login{background:var(--bg);align-items:center;justify-content:center;padding:28px 22px;overflow-y:auto;}
.login{width:100%;max-width:360px;}
.brand{text-align:center;margin-bottom:34px;}
.brand-mark{width:60px;height:60px;border-radius:18px;background:linear-gradient(150deg,#6366f1,#4338ca);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 10px 28px rgba(79,70,229,.35);}
.brand-mark svg{width:30px;height:30px;stroke:#fff;}
.brand h1{font-size:24px;font-weight:800;letter-spacing:-.6px;}
.brand p{font-size:13px;color:var(--ink-3);margin-top:4px;font-weight:500;}
.users{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:26px;}
.user{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);padding:18px 12px;text-align:center;cursor:pointer;transition:.18s;user-select:none;}
.user.active{border-color:var(--p);background:var(--p-soft);}
.user .ava{width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;margin:0 auto 9px;font-size:19px;}
.user.active .ava{background:#fff;}
.user b{font-size:14px;font-weight:700;display:block;}
.user span{font-size:11px;color:var(--ink-3);font-weight:600;}
.pin-cap{text-align:center;font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:14px;}
.dots{display:flex;justify-content:center;gap:13px;margin-bottom:22px;}
.dot{width:13px;height:13px;border-radius:50%;background:var(--line-2);transition:.15s;}
.dot.on{background:var(--p);transform:scale(1.05);}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.kc{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:16px;font-size:21px;font-weight:700;cursor:pointer;user-select:none;transition:.1s;text-align:center;color:var(--ink);}
.kc:active{background:var(--p);color:#fff;transform:scale(.95);}
.kc.alt{font-size:13px;color:var(--ink-2);}
.pin-err{text-align:center;color:var(--red);font-size:12.5px;font-weight:600;margin-top:14px;min-height:18px;}

/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0;}
.tb-l .greet{font-size:11.5px;color:var(--ink-3);font-weight:600;}
.tb-l .title{font-size:20px;font-weight:800;letter-spacing:-.4px;}
.tb-r{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2);transition:.15s;}
.icon-btn:active{background:var(--p-soft);color:var(--p);}
.icon-btn svg{width:19px;height:19px;}
.spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== CONTENT / TABS ===== */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;padding-bottom:calc(var(--nav) + var(--safe-b) + 18px);}
.tab{display:none;}
.tab.show{display:block;}
#tab-ai.show{display:flex;flex-direction:column;height:100%;padding:0;}

/* ===== BOTTOM NAV ===== */
.bnav{position:absolute;left:0;right:0;bottom:0;height:calc(var(--nav) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--surface);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-3);cursor:pointer;padding:8px 12px;transition:color .15s;user-select:none;}
.nav-i.on{color:var(--p);}
.nav-i svg{width:22px;height:22px;}
.nav-i span{font-size:10px;font-weight:700;}
.nav-add{width:50px;height:50px;border-radius:15px;background:linear-gradient(150deg,#6366f1,#4338ca);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px rgba(79,70,229,.4);transition:transform .12s;}
.nav-add:active{transform:scale(.92);}
.nav-add svg{width:24px;height:24px;stroke:#fff;}

/* ===== HERO ===== */
.hero{background:linear-gradient(135deg,#4f46e5,#4338ca);border-radius:18px;padding:18px 18px 20px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);}
.hero .h-date{font-size:11.5px;opacity:.85;font-weight:600;}
.hero .h-name{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-top:2px;}
.hero .h-sub{font-size:12.5px;opacity:.9;margin-top:8px;line-height:1.5;}

/* ===== STATS ===== */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);}
.stat .si{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat .si svg{width:17px;height:17px;}
.stat .sv{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1;}
.stat .sl{font-size:11px;color:var(--ink-2);font-weight:600;margin-top:5px;}
.s-p .si{background:var(--p-soft);color:var(--p);} .s-p .sv{color:var(--ink);}
.s-g .si{background:var(--green-soft);color:var(--green);} .s-g .sv{color:var(--green);}
.s-a .si{background:var(--amber-soft);color:var(--amber);} .s-a .sv{color:var(--amber);}
.s-r .si{background:var(--red-soft);color:var(--red);} .s-r .sv{color:var(--red);}

.sec-hd{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 10px;}
.sec-hd h3{font-size:12px;font-weight:800;color:var(--ink-2);text-transform:uppercase;letter-spacing:.6px;}
.sec-link{font-size:12.5px;color:var(--p);font-weight:700;cursor:pointer;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.chart-wrap{position:relative;height:190px;}

.alert{display:flex;align-items:center;gap:11px;background:var(--red-soft);border:1px solid #f6d4d4;border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;}
.alert .pulse{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;animation:p 1.4s infinite;}
@keyframes p{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ===== SEARCH / FILTERS ===== */
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:11px;box-shadow:var(--shadow);}
.search svg{width:18px;height:18px;color:var(--ink-3);flex-shrink:0;}
.search input{flex:1;border:none;outline:none;background:none;font-size:14px;color:var(--ink);}
.search input::placeholder{color:var(--ink-3);}
.chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:13px;padding-bottom:2px;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:7px 13px;background:var(--surface);border:1.5px solid var(--line);border-radius:20px;font-size:12px;font-weight:700;color:var(--ink-2);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:.15s;}
.chip.on{background:var(--p);border-color:var(--p);color:#fff;}

/* ===== ORDER CARD ===== */
.ocard{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:10px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.ocard:active{border-color:var(--p);}
.ocard.over{border-left:3px solid var(--red);}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.oc-id{font-size:11px;color:var(--ink-3);font-weight:600;}
.oc-name{font-size:15.5px;font-weight:800;letter-spacing:-.2px;}
.oc-meta{font-size:12px;color:var(--ink-2);margin-top:2px;}
.oc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
.oc-prod{font-size:12px;color:var(--ink-3);max-width:58%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.oc-amt{font-size:15px;font-weight:800;color:var(--green);}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.2px;}
.b-pending{background:var(--amber-soft);color:var(--amber);}
.b-transit{background:var(--blue-soft);color:var(--blue);}
.b-delivered{background:var(--green-soft);color:var(--green);}
.b-cancelled{background:var(--red-soft);color:var(--red);}

/* quick-action row on cards */
.qrow{display:flex;gap:7px;margin-top:11px;}
.qa{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:10px;font-size:12px;font-weight:700;border:1.5px solid var(--line);background:var(--surface-2);color:var(--ink-2);cursor:pointer;transition:.15s;}
.qa svg{width:15px;height:15px;}
.qa:active{transform:scale(.97);}
.qa.call{color:var(--green);border-color:var(--green-soft);background:var(--green-soft);}
.qa.wa{color:#128c7e;border-color:#d9f2ee;background:#e9f8f5;}
.qa.map{color:var(--blue);border-color:var(--blue-soft);background:var(--blue-soft);}

/* ===== OVERLAY / SHEET ===== */
.overlay{position:fixed;inset:0;background:rgba(15,23,41,.45);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(2px);}
.overlay.show{display:flex;animation:fade .2s;}
@keyframes fade{from{opacity:0;}}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px calc(34px + var(--safe-b));animation:up .25s cubic-bezier(.2,.8,.2,1);}
@keyframes up{from{transform:translateY(40px);}}
.grab{width:38px;height:4px;background:var(--line-2);border-radius:2px;margin:11px auto 4px;}
.sh-hd{display:flex;align-items:center;gap:10px;padding:8px 0 18px;position:sticky;top:0;background:var(--surface);z-index:2;}
.sh-back{width:34px;height:34px;border-radius:10px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2);flex-shrink:0;}
.sh-back svg{width:18px;height:18px;}
.sh-hd h2{font-size:17px;font-weight:800;letter-spacing:-.3px;flex:1;}

/* ===== FORM ===== */
.fsec{font-size:10.5px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 11px;padding-bottom:7px;border-bottom:1px solid var(--line);}
.fg{margin-bottom:12px;}
.fl{font-size:11.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px;display:block;}
.fi{width:100%;background:var(--surface-2);border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;color:var(--ink);font-size:14px;outline:none;transition:.15s;-webkit-appearance:none;}
.fi:focus{border-color:var(--p);background:#fff;}
select.fi{cursor:pointer;}
textarea.fi{resize:none;height:74px;line-height:1.5;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;gap:8px;margin-bottom:14px;}
.seg-b{flex:1;padding:10px;background:var(--surface-2);border:1.5px solid var(--line);border-radius:10px;text-align:center;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:.15s;}
.seg-b.on{background:var(--p-soft);border-color:var(--p);color:var(--p);}
.calc{background:var(--green-soft);border:1px solid #cdeed7;border-radius:10px;padding:10px 13px;font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px;display:none;}

/* ===== BUTTONS ===== */
.btn{padding:13px 18px;border-radius:12px;font-size:14px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.12s;}
.btn:active{transform:scale(.98);}
.btn svg{width:17px;height:17px;}
.btn-p{background:linear-gradient(150deg,#6366f1,#4338ca);color:#fff;box-shadow:0 5px 16px rgba(79,70,229,.32);}
.btn-ghost{background:var(--surface-2);color:var(--ink);border:1.5px solid var(--line);}
.btn-danger{background:var(--red-soft);color:var(--red);border:1.5px solid #f6d4d4;}
.btn-full{width:100%;}
.btn-row{display:grid;grid-template-columns:1fr 1.6fr;gap:10px;margin-top:18px;}

/* ===== PHOTOS ===== */
.photos{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px;}
.ph{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--surface-2);border:1px solid var(--line);}
.ph img{width:100%;height:100%;object-fit:cover;cursor:pointer;}
.ph .x{position:absolute;top:3px;right:3px;width:19px;height:19px;background:rgba(15,23,41,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer;}
.ph-add{aspect-ratio:1;border:1.5px dashed var(--line-2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-3);cursor:pointer;font-size:10px;font-weight:600;}
.ph-add svg{width:18px;height:18px;}

/* ===== DETAIL ===== */
.d-hero{background:linear-gradient(135deg,#4f46e5,#4338ca);border-radius:16px;padding:18px;color:#fff;margin-bottom:14px;}
.d-hero .di{font-size:11px;opacity:.8;font-weight:700;margin-bottom:3px;}
.d-hero .dn{font-size:21px;font-weight:800;letter-spacing:-.3px;}
.d-hero .dl{font-size:12.5px;opacity:.9;margin-top:3px;}
.d-act{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.dab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface);font-size:10.5px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:.12s;}
.dab svg{width:19px;height:19px;}
.dab:active{transform:scale(.96);}
.dab.green{color:var(--green);} .dab.wa{color:#128c7e;} .dab.blue{color:var(--blue);} .dab.indigo{color:var(--p);}
.dsec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:11px;box-shadow:var(--shadow);}
.dsec-t{font-size:10.5px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px;}
.dr{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);}
.dr:last-child{border-bottom:none;}
.dk{font-size:13px;color:var(--ink-2);}
.dv{font-size:13px;font-weight:700;text-align:right;}
.dv.g{color:var(--green);} .dv.a{color:var(--amber);} .dv.r{color:var(--red);} .dv.p{color:var(--p);}
.d-photos{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.d-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid var(--line);}

/* ===== AI ===== */
#tab-ai{background:var(--bg);}
.ai-msgs{flex:1;overflow-y:auto;padding:16px 14px;}
.ai-m{display:flex;gap:9px;margin-bottom:13px;}
.ai-m.u{flex-direction:row-reverse;}
.ai-av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.ai-m.b .ai-av{background:var(--p-soft);}
.ai-m.u .ai-av{background:var(--surface);border:1px solid var(--line);}
.ai-bub{max-width:80%;padding:11px 13px;border-radius:14px;font-size:14px;line-height:1.55;}
.ai-m.b .ai-bub{background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px;}
.ai-m.u .ai-bub{background:var(--p);color:#fff;border-bottom-right-radius:4px;}
.ai-chips{display:flex;gap:8px;padding:8px 14px;overflow-x:auto;flex-shrink:0;}
.ai-chips::-webkit-scrollbar{display:none;}
.ai-bar{display:flex;gap:9px;padding:10px 14px calc(10px + var(--safe-b));border-top:1px solid var(--line);background:var(--surface);flex-shrink:0;}
.ai-inp{flex:1;background:var(--surface-2);border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14px;outline:none;}
.ai-inp:focus{border-color:var(--p);}
.ai-send{width:44px;height:44px;background:linear-gradient(150deg,#6366f1,#4338ca);border:none;border-radius:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-send svg{width:19px;height:19px;}

/* ===== SETTINGS ===== */
.set-cat{font-size:10.5px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.8px;margin:18px 2px 9px;}
.set-i{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:var(--shadow);transition:.15s;}
.set-i:active{border-color:var(--p);}
.set-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.set-ic svg{width:18px;height:18px;}
.set-info{flex:1;}
.set-info b{font-size:14px;font-weight:700;display:block;}
.set-info span{font-size:12px;color:var(--ink-2);}
.set-arr{color:var(--ink-3);}
.set-arr svg{width:18px;height:18px;}

/* ===== MISC ===== */
.empty{text-align:center;padding:54px 20px;color:var(--ink-3);}
.empty svg{width:42px;height:42px;margin-bottom:12px;color:var(--line-2);}
.empty p{font-size:14px;font-weight:600;}
.toast{position:fixed;left:50%;bottom:calc(var(--nav) + var(--safe-b) + 16px);transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow-lg);white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.pill-offline{position:fixed;top:calc(10px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;padding:6px 15px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;display:none;box-shadow:var(--shadow);}
.pill-offline.show{display:block;}
.banner{background:var(--amber-soft);border:1px solid #f0ddb8;border-radius:12px;padding:12px 14px;margin-bottom:13px;display:flex;gap:10px;align-items:flex-start;}
.banner svg{width:18px;height:18px;color:var(--amber);flex-shrink:0;margin-top:1px;}
.banner div{font-size:12.5px;color:var(--ink);line-height:1.45;}
.banner b{color:var(--amber);}
.banner u{cursor:pointer;color:var(--p);font-weight:700;text-decoration:none;}
.pv{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;display:none;align-items:center;justify-content:center;}
.pv.show{display:flex;}
.pv img{max-width:100%;max-height:100%;object-fit:contain;}
.pv-x{position:absolute;top:calc(16px + env(safe-area-inset-top,0px));right:18px;width:40px;height:40px;background:rgba(255,255,255,.14);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;}
.code-box{background:var(--ink);color:#e7e9ee;border-radius:11px;padding:13px;font-family:ui-monospace,monospace;font-size:11px;line-height:1.55;overflow-x:auto;white-space:pre;margin-bottom:12px;}
.muted{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin-bottom:12px;}
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>

    <div class="tb-r">
      <div class="icon-btn" id="syncBtn" onclick="syncNow()" title="Sync"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg></div>
      <div class="icon-btn" onclick="logout()" title="Logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>

    <div class="nav-i" id="ni-orders" onclick="goTab('orders')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg><span>Orders</span></div>

    <div class="nav-i" id="ni-settings" onclick="goTab('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></div>

<!-- ============ OVERLAYS ============ -->
<div class="overlay" id="ov-form" onclick="bgClose(event,'ov-form')"><div class="sheet" id="formSheet"></div></div>

<script>
/* ════════════════════════════════════════════
   CONFIG — paste your Supabase URL + anon key here,
   OR set them in-app via Settings → Connect Database.
════════════════════════════════════════════ */
const DEFAULT_CONFIG = { url:'', key:'' };

/* ════════════════ STATE ════════════════ */
const LS = { orders:'op_orders', config:'op_config', queue:'op_queue', pins:'op_pins', aikey:'op_aikey' };
let ORDERS = lsGet(LS.orders, []);
let CFG = Object.assign({}, DEFAULT_CONFIG, lsGet(LS.config, {}));
let db = null;
let WHO = null, PIN = '', FILTER = 'all', T_FILTER = 'active';
let EDIT_ID = null, MODE = 'today', PHOTOS = [];
let DONUT = null, BAR = null, AI_HIST = [];
const STATUSES = ['Pending','In Transit','Delivered','Cancelled'];

/* ════════════════ STORAGE HELPERS ════════════════ */
function lsGet(k,def){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

/* ════════════════ DATABASE LAYER ════════════════ */
function initDB(){
  if(window.supabase && CFG.url && CFG.key){
    try{ db = window.supabase.createClient(CFG.url, CFG.key, { auth:{ persistSession:false } }); }
    catch(e){ db=null; }
  } else db=null;
  return db;
}
async function pullOrders(){
  if(!db) return ORDERS;
  const { data, error } = await db.from('orders').select('*').order('order_date',{ascending:false});
  if(error) throw error;
  ORDERS = (data||[]).map(normalize);
  lsSet(LS.orders, ORDERS);
  return ORDERS;
}
function normalize(o){ o.photos = Array.isArray(o.photos)?o.photos:(o.photos?JSON.parse(o.photos):[]); return o; }
function queueOp(op){ const q=lsGet(LS.queue,[]); q.push(op); lsSet(LS.queue,q); }

async function saveOrder(o){
  o.updated_at = new Date().toISOString();
  const i = ORDERS.findIndex(x=>x.id===o.id);
  if(i>=0) ORDERS[i]=o; else ORDERS.unshift(o);
  lsSet(LS.orders, ORDERS);
  if(!db) return;
  if(!navigator.onLine){ queueOp({t:'up',d:o}); return; }
  const { error } = await db.from('orders').upsert(o);
  if(error){ queueOp({t:'up',d:o}); throw error; }
}
async function deleteOrderDb(id){
  ORDERS = ORDERS.filter(x=>x.id!==id);
  lsSet(LS.orders, ORDERS);
  if(!db) return;
  if(!navigator.onLine){ queueOp({t:'del',d:id}); return; }
  const { error } = await db.from('orders').delete().eq('id',id);
  if(error){ queueOp({t:'del',d:id}); throw error; }
}
async function flushQueue(){
  if(!db || !navigator.onLine) return;
  const q = lsGet(LS.queue,[]); if(!q.length) return;
  const remain=[];
  for(const op of q){
    try{
      if(op.t==='up'){ const {error}=await db.from('orders').upsert(op.d); if(error) remain.push(op); }
      else if(op.t==='del'){ const {error}=await db.from('orders').delete().eq('id',op.d); if(error) remain.push(op); }
    }catch(e){ remain.push(op); }
  }
  lsSet(LS.queue, remain);
}
let RT=null;
function subscribeRT(){
  if(!db || RT) return;
  try{
    RT = db.channel('orders-changes')
      .on('postgres_changes',{event:'*',schema:'public',table:'orders'}, async ()=>{ try{ await pullOrders(); renderActive(); }catch(e){} })
      .subscribe();
  }catch(e){}
}

/* ════════════════ AUTH ════════════════ */
function getPins(){ return lsGet(LS.pins, { ayush:'1234', tanaji:'4321' }); }
function setPins(p){ lsSet(LS.pins, p); }
function selUser(u){
  WHO=u; PIN=''; renderDots();
  document.getElementById('user-ayush').classList.toggle('active',u==='ayush');
  document.getElementById('user-tanaji').classList.toggle('active',u==='tanaji');
  document.getElementById('pinErr').textContent='';
}
function pinKey(k){
  const err=document.getElementById('pinErr'); err.textContent='';
  if(k==='c'){ PIN=''; }
  else if(k==='b'){ PIN=PIN.slice(0,-1); }
  else if(PIN.length<4){ PIN+=k; }
  renderDots();
  if(PIN.length===4) setTimeout(checkPin,120);
}
function renderDots(){ for(let i=0;i<4;i++) document.getElementById('dot'+i).classList.toggle('on', i<PIN.length); }
function checkPin(){
  const pins=getPins(); const ok = WHO==='ayush'?pins.ayush:pins.tanaji;
  if(PIN===ok){
    document.getElementById('pinErr').textContent='';
    if(WHO==='ayush'){ showScreen('screen-app'); setGreet(); renderSettings(); renderActive(); checkSetupBanner(); }
    else { showScreen('screen-tanaji'); buildTFilters(); renderTanaji(); }
    bootData();
  } else {
    document.getElementById('pinErr').textContent='Incorrect PIN. Please try again.';
    PIN=''; renderDots();
  }
}
function logout(){ PIN=''; WHO=null; AI_HIST=[]; document.getElementById('aiMsgs').innerHTML=''; showScreen('screen-login'); }

async function bootData(){
  if(!db){ return; }
  spin(true);
  try{ await flushQueue(); await pullOrders(); renderActive(); subscribeRT(); }
  catch(e){ toast('Using offline data'); }
  spin(false);
}
function spin(on){ document.querySelectorAll('#syncBtn svg,#syncBtnT svg').forEach(s=>s.classList.toggle('spin',on)); }
async function syncNow(){ if(!db){ toast('Connect a database in Settings'); return; } spin(true); try{ await flushQueue(); await pullOrders(); renderActive(); toast('✓ Synced'); }catch(e){ toast('Sync failed — offline?'); } spin(false); }

/* ════════════════ SCREENS / NAV ════════════════ */
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show')); document.getElementById(id).classList.add('show'); }
function setGreet(){
  const h=new Date().getHours();
  document.getElementById('greet').textContent = h<12?'Good morning ☀️':h<17?'Good afternoon 🌤':h<21?'Good evening 🌆':'Good night 🌙';
  document.getElementById('heroDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
}
function goTab(t){
  ['home','orders','ai','settings'].forEach(x=>{ document.getElementById('tab-'+x).classList.remove('show'); document.getElementById('ni-'+x).classList.remove('on'); });
  document.getElementById('tab-'+t).classList.add('show');
  document.getElementById('ni-'+t).classList.add('on');
  document.getElementById('appTitle').textContent = {home:'Dashboard',orders:'Orders',ai:'AI Assistant',settings:'Settings'}[t];
  if(t==='home') renderDash();
  if(t==='orders'){ buildFilters(); renderOrders(); }
  if(t==='ai' && !document.getElementById('aiMsgs').children.length) aiWelcome();
}
function renderActive(){
  if(WHO==='ayush'){ renderDash(); if(document.getElementById('tab-orders').classList.contains('show')) renderOrders(); }
  if(WHO==='tanaji') renderTanaji();
}

/* ════════════════ OVERLAYS + HARDWARE BACK ════════════════ */
const ovStack=[];
function openOv(id){ document.getElementById(id).classList.add('show'); ovStack.push(id); history.pushState({ov:id},''); }
function closeTop(){ const id=ovStack.pop(); if(id) document.getElementById(id).classList.remove('show'); }
function dismiss(){ if(ovStack.length) history.back(); } /* triggers popstate */
function bgClose(e,id){ if(e.target.id===id) dismiss(); }
window.addEventListener('popstate', ()=>{ if(ovStack.length) closeTop(); });

/* ════════════════ DASHBOARD ════════════════ */
function renderDash(){
  const total=ORDERS.length;
  const profit=ORDERS.reduce((s,o)=>s+(+o.profit||0),0);
  const balance=ORDERS.filter(o=>o.status!=='Cancelled').reduce((s,o)=>s+(+o.balance||0),0);
  const ov=ORDERS.filter(isOverdue);
  const now=new Date();
  const mCount=ORDERS.filter(o=>{ const d=new Date(o.order_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length;

  document.getElementById('heroSub').textContent = `${total} orders · ₹${fmtK(profit)} profit · ${ov.length} overdue`;
  document.getElementById('statsGrid').innerHTML = `
    ${statCard('s-p','box',total,'Total Orders')}
    ${statCard('s-g','cash','₹'+fmtK(profit),'Total Profit')}
    ${statCard('s-a','clock','₹'+fmtK(balance),'Balance Due')}
    ${statCard('s-r','warn',ov.length,'Overdue')}`;

  const box=document.getElementById('overdueBox');
  if(ov.length){
    box.innerHTML = `<div class="sec-hd"><h3>⚠️ Needs Attention</h3><span class="sec-link" onclick="goTab('orders')">View all</span></div>` +
      ov.slice(0,3).map(o=>`<div class="alert" onclick="showDetail('${o.id}')"><div class="pulse"></div><div style="flex:1"><div style="font-size:14px;font-weight:700">${esc(o.cust_name)}</div><div style="font-size:12px;color:var(--ink-2)">Due ${o.due_date||'—'} · ${o.status}</div></div><div style="color:var(--ink-3)">›</div></div>`).join('');
  } else box.innerHTML='';

  drawCharts();
}
function statCard(c,ic,val,label){
  const icons={box:'<rect x="3" y="8" width="18" height="13" rx="2"/><path d="M3 8 6 3h12l3 5M12 8v13"/>',cash:'<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/>',clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',warn:'<path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/>'};
  return `<div class="stat ${c}"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[ic]}</svg></div><div class="sv tnum">${val}</div><div class="sl">${label}</div></div>`;
}
function drawCharts(){
  if(typeof Chart==='undefined') return;
  const counts={'Pending':0,'In Transit':0,'Delivered':0,'Cancelled':0};
  ORDERS.forEach(o=>{ if(counts[o.status]!==undefined) counts[o.status]++; });
  if(DONUT) DONUT.destroy();
  DONUT=new Chart(document.getElementById('chartDonut'),{type:'doughnut',data:{labels:Object.keys(counts),datasets:[{data:Object.values(counts),backgroundColor:['#d97706','#2563eb','#15803d','#dc2626'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'right',labels:{color:'#5a6475',font:{family:'Manrope',size:11},padding:11,boxWidth:11,boxHeight:11}}}}});

  const last=[...ORDERS].sort((a,b)=>new Date(b.order_date||0)-new Date(a.order_date||0)).slice(0,7).reverse();
  if(BAR) BAR.destroy();
  BAR=new Chart(document.getElementById('chartBar'),{type:'bar',data:{labels:last.map(o=>(o.cust_name||'—').split(' ')[0]),datasets:[{data:last.map(o=>+o.profit||0),backgroundColor:'#6366f1',borderRadius:7,maxBarThickness:34}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9aa3b2',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#9aa3b2',font:{size:10}},grid:{color:'#eef0f3'},border:{display:false}}}}});
}

/* ════════════════ ORDERS LIST ════════════════ */
function buildFilters(){
  const el=document.getElementById('filterChips');
  el.innerHTML=['all',...STATUSES].map(f=>`<div class="chip ${FILTER===f?'on':''}" onclick="setFilter('${f}')">${f==='all'?'All':f}</div>`).join('');
}
function setFilter(f){ FILTER=f; buildFilters(); renderOrders(); }
function renderOrders(){
  const q=(document.getElementById('searchIn').value||'').toLowerCase();
  const list=ORDERS.filter(o=>{
    const mf=FILTER==='all'||o.status===FILTER;
    const ms=!q||[o.cust_name,o.product,o.order_id,o.cust_location].some(v=>(v||'').toLowerCase().includes(q));
    return mf&&ms;
  }).sort((a,b)=>new Date(b.order_date||0)-new Date(a.order_date||0));
  const el=document.getElementById('ordersList');
  if(!list.length){ el.innerHTML=emptyState('No orders found'); return; }
  el.innerHTML=list.map(orderCard).join('');
}
function orderCard(o){

function setMode(m){
  MODE=m;
  document.getElementById('seg-today').classList.toggle('on',m==='today');
  document.getElementById('seg-past').classList.toggle('on',m==='past');
  const el=document.getElementById('f-od');
  if(m==='today'){ el.value=new Date().toISOString().split('T')[0]; el.readOnly=true; }
  else { el.readOnly=false; }
}
function calcPrev(){
  const s=+v('f-sell')||0, b=+v('f-buy')||0, a=+v('f-adv')||0;
  const box=document.getElementById('calcBox');
  if(s>0){ box.style.display='block'; box.textContent=`Profit ₹${fmt(s-b)}  ·  Balance ₹${fmt(s-a)}`; }
  else box.style.display='none';
}
function renderPhotos(){
  document.getElementById('photoGrid').innerHTML =
    PHOTOS.map((p,i)=>`<div class="ph"><img src="${p}" onclick="viewPhoto('${i}',1)"><div class="x" onclick="event.stopPropagation();PHOTOS.splice(${i},1);renderPhotos()">✕</div></div>`).join('') +
    `<div class="ph-add" onclick="document.getElementById('photoIn').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Add</div>`;
}
function addPhotos(inp){
  [...inp.files].slice(0,8).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{ const img=new Image(); img.onload=()=>{
      const c=document.createElement('canvas'); let w=img.width,h=img.height,mx=900;
      if(w>mx||h>mx){ if(w>h){h=h*mx/w;w=mx;}else{w=w*mx/h;h=mx;} }
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      PHOTOS.push(c.toDataURL('image/jpeg',.6)); renderPhotos();
    }; img.src=e.target.result; };
    r.readAsDataURL(f);
  });
  inp.value='';
}
async function saveForm(){
  const name=v('f-name').trim();
  if(!name){ toast('Customer name required'); return; }
  const sell=+v('f-sell')||0, buy=+v('f-buy')||0, adv=+v('f-adv')||0;
  let o = EDIT_ID ? Object.assign({}, ORDERS.find(x=>x.id===EDIT_ID)) : { id:uid(), created_at:new Date().toISOString() };
  if(!o.order_id) o.order_id = 'ORD-'+String(ORDERS.length+1).padStart(3,'0');
  Object.assign(o,{
    cust_name:name, cust_phone:v('f-phone').trim(), cust_location:v('f-loc').trim(),
    product:v('f-prod').trim(), order_date:v('f-od'), due_date:v('f-dd'),
    dist_name:v('f-sup').trim(), status:v('f-status'),
    buy_price:buy, sell_price:sell, advance:adv, balance:sell-adv, profit:sell-buy,
    pay_status:v('f-pay'), remarks:v('f-rm').trim(), photos:PHOTOS
  });
  o.net_profit = (+o.profit||0) - (+o.delivery_expense||0);
  dismiss(); toast('Saving…');
  try{ await saveOrder(o); toast('✓ Saved'); }catch(e){ toast('Saved locally (will sync)'); }
  renderActive();
}

    <div class="fg"><label class="fl">Status</label><select class="fi" id="d-st"><option ${o.status==='In Transit'?'selected':''}>In Transit</option><option ${o.status==='Delivered'?'selected':''}>Delivered</option></select></div>
    <div class="fg"><label class="fl">Notes / Experience</label><textarea class="fi" id="d-nt" placeholder="How did it go?">${esc(o.experience||'')}</textarea></div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="dismiss()">Cancel</button><button class="btn btn-p" onclick="saveDeliv('${id}')">✓ Save Delivery</button></div>`;
  openOv('ov-deliv');
}
function prevNet(profit){ const ex=+v('d-ex')||0; const el=document.getElementById('netPrev'); el.style.display='block'; el.textContent='Net profit after delivery: ₹'+fmt(profit-ex); }
async function saveDeliv(id){
  const o=Object.assign({},ORDERS.find(x=>x.id===id)); if(!o.id) return;
  o.deliv_date=v('d-date'); o.driver_name=v('d-dn').trim(); o.driver_phone=v('d-dp').trim();
  o.delivery_expense=+v('d-ex')||0; o.experience=v('d-nt').trim(); o.status=v('d-st');
  o.net_profit=(+o.profit||0)-o.delivery_expense;
  dismiss(); toast('Saving…');
  try{ await saveOrder(o); toast('✓ Delivery saved'); }catch(e){ toast('Saved locally'); }
  renderTanaji();
}

/* ════════════════ CONTACT ACTIONS ════════════════ */
function cleanPhone(p){ if(!p) return ''; let d=(''+p).replace(/[^\d]/g,''); if(d.length===10) d='91'+d; return d; }
function callNum(p){ if(!p){ toast('No phone number'); return; } window.location.href='tel:+'+p; }
function waCustomer(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const ph=cleanPhone(o.cust_phone);
  const msg=`Hi ${o.cust_name||''}, regarding your order ${o.order_id||''}${o.product?' ('+o.product.slice(0,40)+')':''}.`;
  window.open('https://wa.me/'+(ph||'')+'?text='+encodeURIComponent(msg),'_blank');
}
function openMap(loc){ if(!loc){ toast('No location set'); return; } window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(loc),'_blank'); }
function shareOrder(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const msg=`📦 *${o.order_id||''}*\n👤 ${o.cust_name||'—'}\n📍 ${o.cust_location||'—'}\n📞 ${o.cust_phone||'—'}\n\n🛍 ${o.product||'—'}\n📅 Order: ${o.order_date||'—'}\n⏰ Due: ${o.due_date||'—'}\n📊 ${o.status}\n💰 Amount: ₹${fmt(o.sell_price||0)}\n💵 Balance: ₹${fmt(o.balance||0)}`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

/* ════════════════ PHOTO VIEWER ════════════════ */
let DETAIL_PHOTOS=[];
function viewPhoto(i,fromForm){ const src = fromForm? PHOTOS[i] : DETAIL_PHOTOS[i]; if(!src) return; document.getElementById('pvImg').src=src; document.getElementById('pv').classList.add('show'); }
function closePV(){ document.getElementById('pv').classList.remove('show'); }

/* ════════════════ AI ════════════════ */
function aiWelcome(){
  document.getElementById('aiChips').innerHTML=['Total profit this month','Which orders are overdue?','Top customers','Pending payments'].map(q=>`<div class="chip" onclick="aiSend('${q}')">${q}</div>`).join('');
  addAI("Hi Ayush 👋 I'm your business assistant. I can see your orders — ask me about profit, overdue orders, customers, or payments.",'b');
}
async function aiSend(q){
  const inp=document.getElementById('aiInp');
  const msg=q||inp.value.trim(); if(!msg) return;
  inp.value=''; addAI(msg,'u'); AI_HIST.push({role:'user',content:msg});
  const bub=addAI('Thinking…','b');
  const key=lsGet(LS.aikey,'');
  if(!key){ bub.textContent='Add your Anthropic API key in Settings → AI Assistant to enable this.'; return; }
  const ctx=`You are a concise business analyst for Ayush's order management. ${ORDERS.length} total orders. Total profit ₹${ORDERS.reduce((s,o)=>s+(+o.profit||0),0)}. Data (recent): ${JSON.stringify(ORDERS.slice(0,15).map(o=>({id:o.order_id,customer:o.cust_name,status:o.status,date:o.order_date,due:o.due_date,sell:o.sell_price,profit:o.profit,balance:o.balance,pay:o.pay_status})))}. Answer briefly, use ₹.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:ctx,messages:AI_HIST.slice(-10)})});
    const d=await r.json();
    const reply=d.content?.[0]?.text||(d.error?.message)||'No response.';
    bub.innerHTML=esc(reply).replace(/\n/g,'<br>'); AI_HIST.push({role:'assistant',content:reply});
  }catch(e){ bub.textContent='Connection error. Check your API key and internet.'; }
  document.getElementById('aiMsgs').scrollTop=99999;
}
function addAI(text,role){
  const d=document.createElement('div'); d.className='ai-m '+role;
  d.innerHTML=`<div class="ai-av">${role==='b'?'🤖':'🧑'}</div><div class="ai-bub">${esc(text).replace(/\n/g,'<br>')}</div>`;
  document.getElementById('aiMsgs').appendChild(d);
  document.getElementById('aiMsgs').scrollTop=99999;
  return d.querySelector('.ai-bub');
}

/* ════════════════ SETTINGS ════════════════ */
function renderSettings(){
  const dbState = db ? 'Connected ✓' : (CFG.url?'Configured (offline)':'Not connected — local only');
  const aiState = lsGet(LS.aikey,'')?'Configured ✓':'Not configured';
  document.getElementById('tab-settings').innerHTML=`
    <div class="set-cat">Data</div>
    ${setItem('db','var(--p-soft)','var(--p)','M21 12c0 1.66-4 3-9 3s-9-1.34-9-3M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5M3 5c0 1.66 4 3 9 3s9-1.34 9-3-4-3-9-3-9 1.34-9 3','Connect Database',dbState,'openConfig()')}
    ${setItem('exp','var(--green-soft)','var(--green)','M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3','Export Orders (CSV)','Download all data','doExport()')}
    <div class="set-cat">AI</div>
    ${setItem('ai','var(--blue-soft)','var(--blue)','M12 8V4H8M4 8h16v12H4zM2 14h2M20 14h2','AI Assistant Key',aiState,'openAIKey()')}
    <div class="set-cat">Security</div>
    ${setItem('pin','var(--amber-soft)','var(--amber)','M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4','Change PIN','Update your login PIN','openPinChange()')}
    <div class="set-cat">About</div>
    <div class="set-i" style="cursor:default"><div class="set-ic" style="background:var(--bg)">📦</div><div class="set-info"><b>OrderPro</b><span>Version 2.0 · ${ORDERS.length} orders stored</span></div></div>`;
}
function setItem(id,bg,fg,path,title,sub,fn){
  return `<div class="set-i" onclick="${fn}"><div class="set-ic" style="background:${bg};color:${fg}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${path}"/></svg></div><div class="set-info"><b>${title}</b><span>${sub}</span></div><div class="set-arr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div></div>`;
}
function openConfig(){
  const sql = `create table if not exists orders (
  id uuid primary key,
  order_id text, order_date date, due_date date, deliv_date date,
  status text, pay_status text,
  cust_name text, cust_phone text, cust_location text,
  product text, dist_name text,
  buy_price numeric, sell_price numeric, advance numeric,
  balance numeric, profit numeric,
  delivery_expense numeric, net_profit numeric,
  driver_name text, driver_phone text,
  remarks text, experience text, photos jsonb,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);
alter table orders enable row level security;
create policy "app access" on orders for all using (true) with check (true);

-- Required for new projects (2026): grant API + live updates
grant usage on schema public to anon, authenticated;
grant all on table orders to anon, authenticated;
alter publication supabase_realtime add table orders;`;
  document.getElementById('modalSheet').innerHTML=`
    <div class="grab"></div>
    <div class="sh-hd"><div class="sh-back" onclick="dismiss()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div><h2>Connect Database</h2></div>
    <div class="muted">Paste your Supabase <b>Project URL</b> and <b>anon key</b> (Supabase dashboard → Project Settings → API). This makes data load instantly and sync across devices.</div>
    <div class="fg"><label class="fl">Supabase URL</label><input class="fi" id="cfg-url" value="${esc(CFG.url||'')}" placeholder="https://xxxx.supabase.co"></div>
    <div class="fg"><label class="fl">Anon Key</label><input class="fi" id="cfg-key" value="${esc(CFG.key||'')}" placeholder="eyJhbGci…"></div>
    <button class="btn btn-p btn-full" onclick="saveConfig()" style="margin-bottom:18px">Save & Connect</button>
    <div class="muted">First time? Run this once in Supabase → SQL Editor to create the table:</div>
    <div class="code-box">${esc(sql)}</div>`;
  openOv('ov-modal');
}
async function saveConfig(){
  CFG.url=v('cfg-url').trim(); CFG.key=v('cfg-key').trim();
  lsSet(LS.config,CFG); initDB(); dismiss();
  if(db){ toast('Connecting…'); try{ await pullOrders(); renderActive(); subscribeRT(); toast('✓ Connected'); }catch(e){ toast('Saved — check URL/key'); } }
  else toast('Saved (local mode)');
  renderSettings(); checkSetupBanner();
}
function openAIKey(){
  document.getElementById('modalSheet').innerHTML=`
    <div class="grab"></div>
    <div class="sh-hd"><div class="sh-back" onclick="dismiss()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div><h2>AI Assistant Key</h2></div>
    <div class="muted">Paste your Anthropic API key to enable the AI tab. Get one at console.anthropic.com.</div>
    <div class="fg"><label class="fl">Anthropic API Key</label><input class="fi" id="ai-key" type="password" value="${esc(lsGet(LS.aikey,''))}" placeholder="sk-ant-…"></div>
    <button class="btn btn-p btn-full" onclick="saveAIKey()">Save Key</button>`;
  openOv('ov-modal');
}
function saveAIKey(){ const k=v('ai-key').trim(); if(!k){ toast('Enter a key'); return; } lsSet(LS.aikey,k); dismiss(); renderSettings(); toast('✓ AI key saved'); }
function openPinChange(){
  document.getElementById('modalSheet').innerHTML=`
    <div class="grab"></div>
    <div class="sh-hd"><div class="sh-back" onclick="dismiss()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div><h2>Change PIN</h2></div>
    <div class="fg"><label class="fl">Current PIN</label><input class="fi" id="pc-cur" type="password" inputmode="numeric" maxlength="4"></div>
    <div class="fg"><label class="fl">New PIN (4 digits)</label><input class="fi" id="pc-new" type="password" inputmode="numeric" maxlength="4"></div>
    <div class="fg"><label class="fl">Confirm New PIN</label><input class="fi" id="pc-cf" type="password" inputmode="numeric" maxlength="4"></div>
    <div class="pin-err" id="pc-err"></div>
    <button class="btn btn-p btn-full" onclick="savePinChange()">Update PIN</button>`;
  openOv('ov-modal');
}
function savePinChange(){
  const pins=getPins(), cur=v('pc-cur'), nw=v('pc-new'), cf=v('pc-cf'), err=document.getElementById('pc-err');
  const ok=WHO==='ayush'?pins.ayush:pins.tanaji;
  if(cur!==ok){ err.textContent='Current PIN is wrong'; return; }
  if(!/^\d{4}$/.test(nw)){ err.textContent='PIN must be 4 digits'; return; }
  if(nw!==cf){ err.textContent='PINs do not match'; return; }
  if(WHO==='ayush') pins.ayush=nw; else pins.tanaji=nw;
  setPins(pins); dismiss(); toast('✓ PIN updated');
}
function doExport(){
  if(!ORDERS.length){ toast('No orders to export'); return; }
  const cols=['order_id','order_date','due_date','status','pay_status','cust_name','cust_phone','cust_location','product','dist_name','buy_price','sell_price','advance','balance','profit','delivery_expense','net_profit','deliv_date','driver_name','remarks'];
  const csv=[cols.join(','),...ORDERS.map(o=>cols.map(c=>`"${(''+(o[c]??'')).replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='orders.csv'; a.click(); toast('✓ Exported');
}
function checkSetupBanner(){
  const el=document.getElementById('setupBanner'); if(!el) return;
  el.innerHTML = db ? '' :
    `<div class="banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg><div><b>Running in offline mode.</b> Data is saved on this device only. <u onclick="openConfig()">Connect Supabase</u> for fast cloud sync across devices.</div></div>`;
}

/* ════════════════ UTILS ════════════════ */
function v(id){ const el=document.getElementById(id); return el?el.value:''; }
function fmt(n){ return Number(n||0).toLocaleString('en-IN'); }
function fmtK(n){ n=+n||0; return n>=1e5?(n/1e5).toFixed(1)+'L':n>=1e3?(n/1e3).toFixed(1)+'K':fmt(n); }
function uid(){ return (crypto.randomUUID&&crypto.randomUUID())||('id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }
function esc(s){ return (''+(s??'')).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function row(k,val,cls){ return `<div class="dr"><div class="dk">${k}</div><div class="dv ${cls||''}">${val}</div></div>`; }
function emptyState(t){ return `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg><p>${t}</p></div>`; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2400); }

window.addEventListener('offline',()=>document.getElementById('offlinePill').classList.add('show'));
window.addEventListener('online',()=>{ document.getElementById('offlinePill').classList.remove('show'); flushQueue().then(()=>{ if(WHO) syncNow(); }); });

/* ════════════════ INIT ════════════════ */
function start(){ initDB(); selUser('ayush'); }
if(window.supabase!==undefined || document.readyState==='complete') start();
else window.addEventListener('load', start);
</script>
